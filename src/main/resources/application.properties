spring.application.name=live-sports-streaks-backend
server.port=${PORT:8080}

# Database
# Railway injects PGHOST/PGPORT/PGDATABASE/PGUSER/PGPASSWORD — fall back to DB_URL/DB_USERNAME/DB_PASSWORD for local dev
spring.datasource.url=${DB_URL:jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:streaks}}
spring.datasource.username=${DB_USERNAME:${PGUSER:postgres}}
spring.datasource.password=${DB_PASSWORD:${PGPASSWORD:}}

# CORS — set ALLOWED_ORIGINS in Railway to your Vercel URL (comma-separated for multiple)
cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:5173}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# api-sports.io — one key, multiple sport URLs
api.sports.key=${API_SPORTS_KEY:}
api.football.url=${API_FOOTBALL_URL:https://v3.football.api-sports.io}
api.basketball.url=${API_BASKETBALL_URL:https://v1.basketball.api-sports.io}
api.nba.url=${API_NBA_URL:https://v2.nba.api-sports.io}
api.afl.url=${API_AFL_URL:https://v1.afl.api-sports.io}
api.baseball.url=${API_BASEBALL_URL:https://v1.baseball.api-sports.io}
api.hockey.url=${API_HOCKEY_URL:https://v1.hockey.api-sports.io}
api.rugby.url=${API_RUGBY_URL:https://v1.rugby.api-sports.io}
api.handball.url=${API_HANDBALL_URL:https://v1.handball.api-sports.io}
api.volleyball.url=${API_VOLLEYBALL_URL:https://v1.volleyball.api-sports.io}
api.mma.url=${API_MMA_URL:https://v1.mma.api-sports.io}
api.nfl.url=${API_NFL_URL:https://v1.american-football.api-sports.io}
api.formula1.url=${API_FORMULA1_URL:https://v1.formula-1.api-sports.io}

logging.level.com.livesportsstreaks=INFO

# Scheduler — match data refresh interval
# fixedDelay: wait this many ms after each run completes before starting the next
# 3600000 ms = 1 hour (~24 requests/day, within 100 req/day API quota)
scheduler.match-fetch.fixed-delay=3600000
scheduler.match-fetch.initial-delay=0
